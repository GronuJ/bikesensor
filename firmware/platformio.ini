; PlatformIO config for the bikesensor firmware.
;
; The source lives in ./bikesensor/bikesensor.ino — src_dir points there
; so PlatformIO compiles the .ino without us having to move/rename it.
;
; Build:    pio run -d firmware
; Upload:   pio run -d firmware -t upload
; Monitor:  pio device monitor -b 115200

[platformio]
src_dir = bikesensor

[env:esp32-c3-supermini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
lib_deps =
    h2zero/NimBLE-Arduino@^2.1.0
build_flags =
    -DCORE_DEBUG_LEVEL=2
    ; ESP32-C3 talks to the host over native USB-Serial-JTAG, not a UART chip.
    ; These flags route Serial.* through USB-CDC so `pio device monitor` works.
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
